name: License Compliance

on:
  push:
    branches: ['main']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '19.5.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run License Check
        id: license_check
        run: |
          EXIT_CODE=0
          for attempt in 1 2 3; do
            echo "::group::License check attempt $attempt of 3"
            npm run license:check
            EXIT_CODE=$?
            echo "::endgroup::"
            if [ $EXIT_CODE -eq 0 ]; then
              echo "License check passed."
              break
            elif [ $EXIT_CODE -eq 127 ]; then
              echo "::warning::Attempt $attempt: ClearlyDefined service unavailable (HTTP 524 / exit 127 - inconclusive)."
              if [ $attempt -lt 3 ]; then
                echo "Waiting 60s before retry..."
                sleep 60
              fi
            else
              echo "::error::License check failed with exit code $EXIT_CODE (license violation or other error)."
              break
            fi
          done
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Exit 127 = ClearlyDefined timeout — inconclusive, not a license violation.
          # Treat as a warning so the review step can still run and submit unknowns to Eclipse IP.
          if [ $EXIT_CODE -eq 127 ]; then
            echo "::warning::License check inconclusive after 3 attempts. Review step will submit unknown packages."
            exit 0
          fi
          exit $EXIT_CODE

      - name: Run License Check with Review
        if: always()
        run: npm run license:check:review
        env:
          DASH_TOKEN: ${{ secrets.GITLAB_API_TOKEN }}
        continue-on-error: true
